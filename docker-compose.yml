services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trackmyfood
      POSTGRES_PASSWORD: trackmyfood
      POSTGRES_DB: trackmyfood
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackmyfood"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgres://trackmyfood:trackmyfood@db:5432/trackmyfood?sslmode=disable
      PORT: "8080"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
