services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackmyfood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-trackmyfood}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./migrations/002_user_auth.up.sql:/docker-entrypoint-initdb.d/02_auth.sql:ro
      - ./seed/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackmyfood}"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/halva2251/trackmyfood-backend:latest
    build: .
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trackmyfood}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-trackmyfood}?sslmode=disable
      PORT: "8080"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
